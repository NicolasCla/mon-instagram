<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Instagram</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Mon mini-Instagram</h1>

  <div id="zone-auth"></div>
  <!-- ↑ Conteneur vide qu'on va remplir dynamiquement : soit un
       formulaire de connexion/inscription, soit "Bonjour X" + déconnexion,
       selon l'état de connexion. -->

  <form id="form-post" style="display: none;" enctype="multipart/form-data">
  <textarea id="texte" placeholder="Quoi de neuf ?" required></textarea>
  <input type="file" id="image" accept="image/*">
  <button type="submit">Publier</button>
    </form>

  <div id="fil-posts"></div>

  <script src="script.js"></script>
</body>
</html>
